server:
  port: 8001

# ==========applicationName + druid-mysql8 driver===================
spring:
  profiles:
    active: dev
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://10.211.55.30:3306/springcloud?characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: user
    password: 123456
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000

# ========================mybatis===================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.practice.entityes
  configuration:
    map-underscore-to-camel-case: true

# ========================zipkin===================
management:
  zipkin:
    tracing:
      endpoint: http://10.211.55.30:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0 #采样率默认为0.1(0.1就是10次只能有一次被记录下来)，值越大收集越及时。
